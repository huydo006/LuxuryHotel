<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác thực - Luxury Hotel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background: url('https://images.unsplash.com/photo-1578683010236-d716f9a3f461?q=80&w=2000&auto=format&fit=crop') no-repeat center center/cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Lớp phủ đen mờ */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.6);
            z-index: 1;
        }

        .auth-card {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.95);
            width: 450px;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            max-height: 90vh;
            /* Giới hạn chiều cao card bằng 90% màn hình */
            overflow-y: auto;
        }

        .auth-card::-webkit-scrollbar {
            width: 6px;
        }

        .auth-card::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 10px;
        }


        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header h2 {
            color: #0f172a;
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        .auth-header p {
            color: #64748b;
            font-size: 0.95rem;
        }

        .auth-header span {
            color: #d4af37;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #1e293b;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #d4af37;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background-color: #0f172a;
            color: #d4af37;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-primary:hover {
            background-color: #1e293b;
            transform: translateY(-2px);
        }

        .switch-form {
            text-align: center;
            margin-top: 25px;
            font-size: 0.9rem;
            color: #64748b;
        }

        .switch-form a {
            color: #d4af37;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
        }

        .switch-form a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: #fee2e2;
            color: #b91c1c;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid #ef4444;
        }

        .success-message {
            background: #dcfce7;
            color: #15803d;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid #22c55e;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <div class="overlay"></div>

    <div class="auth-card">
        <div class="auth-header">
            <h2 id="form-title">Đăng Nhập</h2>
            <p>Hệ thống quản lý <span>Luxury Hotel</span></p>
        </div>

        <div id="error-msg" class="error-message"></div>
        <div id="success-msg" class="success-message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>Tên đăng nhập</label>
                <input type="text" id="l-username" required placeholder="Nhập tài khoản">
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="l-password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-primary">Đăng Nhập</button>
            <div class="switch-form">
                Chưa có tài khoản? <a id="show-register">Đăng ký ngay</a>
            </div>
        </form>

        <form id="registerForm" class="hidden">
            <div class="form-group">
                <label>Họ và tên</label>
                <input type="text" id="r-fullname" required placeholder="VD: Nguyễn Văn A">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="r-email" required placeholder="VD: email@example.com">
            </div>
            <div class="form-group">
                <label>Số điện thoại</label>
                <input type="text" id="r-phone" required placeholder="VD: 0987654321">
            </div>
            <div class="form-group">
                <label>Tên đăng nhập</label>
                <input type="text" id="r-username" required placeholder="Tạo tài khoản">
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="r-password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-primary">Tạo Tài Khoản</button>
            <div class="switch-form">
                Đã có tài khoản? <a id="show-login">Quay lại đăng nhập</a>
            </div>
        </form>
    </div>

    <script type="module" src="./js/auth.js"></script>
</body>

</html>
