spring.application.name=luxury-hotel-be
server.port=8080
spring.datasource.url=jdbc:mysql://localhost:3306/luxury_hotel?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=050306

# Đổi thành none để Spring Boot tôn trọng cấu trúc SQL bạn vừa chạy
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Tắt chế độ tự động chuyển đổi tên cột (CamelCase sang Underscore)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.web.resources.static-locations=classpath:/static/,file:./uploads/
